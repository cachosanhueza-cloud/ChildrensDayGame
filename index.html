<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Juego: Día del Niño 2026</title>
<style>
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:#0d2b4d; color:white; text-align:center; margin:0; touch-action: manipulation; }
  
  h2 { margin: 10px 0 5px; color: #4facfe; font-size: 20px; }

  .topbar {
    display:flex; justify-content:center; align-items:center; gap:15px;
    margin: 5px 10px; background: rgba(255,255,255,0.05);
    padding: 8px; border-radius: 12px;
  }

  #playerName {
    padding:6px 10px; font-size:14px; border-radius:8px; border:none; width:180px; outline: none;
  }

  .timer { font-size:20px; font-weight: bold; color: #ffcc00; }

  .game-container {
    display: flex; gap: 15px; padding: 10px; align-items: flex-start;
  }

  /* Columna Izquierda ajustada para horizontal */
  .name-source {
    flex: 0 0 150px;
    position: sticky; top: 10px;
    background: rgba(255,255,255,0.1); padding: 10px;
    border-radius: 15px; border: 2px solid #4facfe; min-height: 100px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }

  .draggable-name {
    padding: 10px 5px; background: #0f69ff; color: white;
    border-radius: 8px; cursor: grab; font-weight: bold;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-size: 14px;
    width: 90%; user-select: none;
  }

  .photo-grid {
    flex: 1; display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 10px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 15px;
  }

  .photo-card {
    background: #1f4c7a; border-radius: 10px; padding: 3px;
    border: 2px solid rgba(255,255,255,0.1); transition: all 0.2s;
    position: relative; min-height: 110px;
  }
  
  .photo-card img {
    width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 6px;
    pointer-events: none;
  }

  .assigned-name {
    margin-top: 3px; font-size: 9px; background: #0b7a2a;
    padding: 2px; border-radius: 4px; word-wrap: break-word;
  }

  /* AVISO DE ROTACIÓN: Solo aparece en móviles en vertical */
  #rotate-device {
    display: none;
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #0d2b4d; z-index: 9999;
    flex-direction: column; justify-content: center; align-items: center;
  }

  @media (orientation: portrait) and (max-width: 900px) {
    #rotate-device { display: flex; }
  }

  #overlay {
    display: none; position: fixed; top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.95); z-index: 1000;
    flex-direction: column; justify-content: center; align-items: center;
  }

  #submitBtn {
    padding: 10px 25px; font-size:14px; background: #00c6ff;
    color:white; border:none; border-radius:50px; cursor:pointer;
    margin: 10px 0; font-weight: bold;
  }
</style>
</head>
<body>

<!-- Pantalla que obliga a girar el celular -->
<div id="rotate-device">
  <div style="font-size: 50px;">🔄</div>
  <h3 style="padding: 20px;">Por favor, gira tu celular a posición horizontal para jugar mejor.</h3>
</div>

<div id="overlay">
  <div class="loader" id="loaderIcon"></div>
  <h2 id="statusMsg">Enviando respuestas...</h2>
  <div id="timeUpNotice" class="warning-text" style="display:none; color: #ff4d4d; font-weight: bold; font-size: 18px;">¡TIEMPO AGOTADO!</div>
  <p id="finalDetails"></p>
  <button onclick="location.reload()" id="closeBtn" style="display:none; padding:10px 20px;">Reintentar</button>
</div>

<h2>📸 Día del Niño 2026: Arrastra el nombre a la imagen de la personita</h2>

<div class="topbar">
  <input id="playerName" placeholder="Nombre y Apellido..." />
  <div class="timer" id="timer">20:00</div>
</div>

<div class="game-container">
  <div class="name-source" id="nameSource">
    <div id="activeNameContainer"></div>
    <p id="counterInfo" style="font-size: 10px; color: #4facfe; margin-top: 10px;"></p>
  </div>
  <div class="photo-grid" id="photoGrid"></div>
</div>

<button id="submitBtn" onclick="submitGame(false)">ENVIAR RESULTADOS</button>

<iframe id="gf_iframe" name="gf_iframe" style="display:none;"></iframe>
<form id="gf_form" action="https://docs.google.com/forms/d/e/1FAIpQLSdXS2Z1exk97xISzPHK3UtO0wx89eALhMU7EeLrbbUk-8fmyw/formResponse" method="POST" target="gf_iframe">
  <input type="hidden" name="entry.1605782671" id="gf_name">
  <input type="hidden" name="entry.1710413261" id="gf_score">
  <input type="hidden" name="entry.926972941"  id="gf_time">
  <input type="hidden" name="entry.2137308450" id="gf_attempt">
</form>

<script>
// Lógica del juego (Mantenemos tu base de datos y funciones)
const GAME_ID = "baby-match-v1";
const DURATION_SECONDS = 1200; 

const dataBase = [
  { n: "1.jpg", nombre: "Adrian Hernandez" }, { n: "2.jpg", nombre: "Adriana Arreola" },
  { n: "3.jpeg", nombre: "Agatha Pena" }, { n: "4.png", nombre: "Alejandro Padilla" },
  { n: "5.png", nombre: "Alfonso Mejia" }, { n: "6.jpg", nombre: "Berenice Guevara" },
  { n: "7.jpg", nombre: "Carlos Trujillo" }, { n: "8.jpeg", nombre: "Cesar Casales" },
  { n: "9.png", nombre: "Cesar Rafaela" }, { n: "10.jpg", nombre: "Cristian Sanhueza" },
  { n: "11.jpg", nombre: "Daniel Hernandez" }, { n: "12.jpeg", nombre: "Eduardo Lopez" },
  { n: "13.jpeg", nombre: "Emerson Cortes" }, { n: "14.jpg", nombre: "Estefani Flores" },
  { n: "15.jpeg", nombre: "Everardo Martinez" }, { n: "16.jpeg", nombre: "Gabriela Vives" },
  { n: "17.jpg", nombre: "Iris Soto" }, { n: "18.jpg", nombre: "Jacqueline Torres" },
  { n: "19.jpg", nombre: "Jessica Salazar" }, { n: "20.jpeg", nombre: "Jonatan Islas" },
  { n: "21.jpg", nombre: "Judith Arellano" }, { n: "22.jpg", nombre: "Karen Echavarria" },
  { n: "23.jpg", nombre: "Karen Marin" }, { n: "24.jpg", nombre: "Katherine Granados" },
  { n: "25.png", nombre: "Luis Javier" }, { n: "26.jpg", nombre: "Luis Perez" },
  { n: "27.png", nombre: "Maria Ramirez" }, { n: "28.jpeg", nombre: "Mariana Aguilera" },
  { n: "29.jpeg", nombre: "Nancy Ayala" }, { n: "30.jpg", nombre: "Nayeli Linares" },
  { n: "31.jpeg", nombre: "Romali Trejo" }, { n: "32.jpeg", nombre: "Rosa Diosdado" },
  { n: "33.jpg", nombre: "Rosy Marin" }, { n: "34.jpg", nombre: "Silvia Barrios" },
  { n: "35.jpg", nombre: "Silvia Mora" }, { n: "36.jpg", nombre: "Valeria Valdez" },
  { n: "37.jpg", nombre: "Wendy Ramos" }, { n: "38.jpeg", nombre: "Yair Oviedo" }
];

let answers = {}; 
let pendingNames = dataBase.map(item => item.nombre).sort(() => Math.random() - 0.5);
let locked = false;
let startTime = Date.now();

const photoGrid = document.getElementById("photoGrid");
const activeNameContainer = document.getElementById("activeNameContainer");
const counterInfo = document.getElementById("counterInfo");

function toTitleCase(str) {
  return str.toLowerCase().split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
}

// Render fotos
[...dataBase].sort(() => Math.random() - 0.5).forEach(item => {
  const card = document.createElement("div");
  card.classList.add("photo-card");
  card.innerHTML = `<img src="fotos/${item.n}" alt="foto">`;
  
  card.ondragover = e => { if(!locked) e.preventDefault(); };
  card.ondrop = e => {
    if(locked) return;
    e.preventDefault();
    const nameText = e.dataTransfer.getData("text");
    if(answers[item.n]) return;
    answers[item.n] = nameText;
    const label = document.createElement("div");
    label.classList.add("assigned-name");
    label.innerText = nameText;
    card.appendChild(label);
    card.style.borderColor = "#0b7a2a";
    pendingNames.shift();
    showNextName();
  };

  card.onclick = () => {
    if(locked || !answers[item.n]) return;
    const nameToReturn = answers[item.n];
    delete answers[item.n];
    const label = card.querySelector('.assigned-name');
    if(label) label.remove();
    card.style.borderColor = "rgba(255,255,255,0.1)";
    pendingNames.unshift(nameToReturn);
    showNextName();
  };
  photoGrid.appendChild(card);
});

function showNextName() {
  activeNameContainer.innerHTML = "";
  if(pendingNames.length > 0) {
    const nameDiv = document.createElement("div");
    nameDiv.classList.add("draggable-name");
    nameDiv.innerText = pendingNames[0];
    nameDiv.draggable = true;
    nameDiv.ondragstart = e => e.dataTransfer.setData("text", pendingNames[0]);
    activeNameContainer.appendChild(nameDiv);
    counterInfo.innerText = `${Object.keys(answers).length} de ${dataBase.length}`;
  } else {
    activeNameContainer.innerHTML = "🏁";
  }
}
showNextName();

setInterval(() => {
  if(locked) return;
  const left = Math.max(0, DURATION_SECONDS - Math.floor((Date.now() - startTime)/1000));
  const m = Math.floor(left/60); const s = left % 60;
  document.getElementById("timer").innerText = `${m}:${s < 10 ? "0"+s : s}`;
  if(left <= 0) submitGame(true);
}, 1000);

function submitGame(isTimeUp) {
  if(locked && !isTimeUp) return;
  let rawName = (document.getElementById("playerName").value || "").trim();
  if(!rawName && !isTimeUp) { alert("Escribe tu nombre"); return; }
  
  locked = true;
  document.getElementById("overlay").style.display = "flex";
  
  let score = 0;
  dataBase.forEach(item => { if(answers[item.n] === item.nombre) score++; });

  const elapsed = Math.floor((Date.now() - startTime)/1000);
  document.getElementById("gf_name").value = toTitleCase(rawName || "Anónimo");
  document.getElementById("gf_score").value = score;
  document.getElementById("gf_time").value = elapsed;
  document.getElementById("gf_attempt").value = Date.now();
  document.getElementById("gf_form").submit();

  setTimeout(() => {
    document.getElementById("statusMsg").innerText = "¡Enviado!";
    document.getElementById("finalDetails").innerHTML = `Aciertos: ${score}<br>Tiempo: ${elapsed}s`;
    document.getElementById("closeBtn").style.display = "block";
  }, 2000);
}
</script>
</body>
</html>
